<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- Ornamental left line -->
  <line x1="8" y1="40" x2="28" y2="40" stroke="#C9A84C" stroke-width="0.8"/>
  <circle cx="30" cy="40" r="1.5" fill="#C9A84C"/>

  <!-- D letterform -->
  <text x="38" y="52" font-family="Georgia, serif" font-size="38" font-style="italic" font-weight="300" fill="#2C2C2C" letter-spacing="-1">D</text>

  <!-- Dot separator -->
  <circle cx="72" cy="42" r="2" fill="#C9A84C"/>

  <!-- EVENTS text -->
  <text x="78" y="51" font-family="Georgia, serif" font-size="16" font-weight="400" fill="#2C2C2C" letter-spacing="4">EVENTS</text>

  <!-- Ornamental right line -->
  <circle cx="168" cy="40" r="1.5" fill="#C9A84C"/>
  <line x1="170" y1="40" x2="190" y2="40" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- Thin gold underline under EVENTS -->
  <line x1="78" y1="55" x2="163" y2="55" stroke="#C9A84C" stroke-width="0.5" opacity="0.6"/>
</svg>
