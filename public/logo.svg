<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 195 58" fill="none">
  <!-- Large italic D -->
  <text x="4" y="48"
        font-family="Georgia, serif"
        font-size="50"
        font-style="italic"
        font-weight="300"
        fill="#2C2C2C">D</text>

  <!-- Thin gold vertical hairline separator -->
  <line x1="60" y1="7" x2="60" y2="51" stroke="#C9A84C" stroke-width="0.75"/>

  <!-- EVENTS in tracked small caps, vertically centred to the D -->
  <text x="73" y="35"
        font-family="Georgia, serif"
        font-size="11.5"
        font-weight="400"
        fill="#2C2C2C"
        letter-spacing="5">EVENTS</text>
</svg>
